<section class="search-page-section">
  <div class="container">
    <div class="search-bar-wrap">
      <svg class="search-bar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

<script src="../js/search-index.js"></script>
<script src="../js/script.js"></script>
<script>
(function(){
  var input = document.getElementById('searchPageInput');
  var resultsDiv = document.getElementById('searchPageResults');

  // Read query from URL ?q=...
  var params = new URLSearchParams(window.location.search);
  var initialQuery = params.get('q') || '';
  if (initialQuery) {
    input.value = initialQuery;
    performSearch(initialQuery);
  }

  // Live search on typing
  input.addEventListener('input', function(){
    var q = this.value.trim();
    // Update URL without reload
    var newUrl = window.location.pathname + (q ? '?q=' + encodeURIComponent(q) : '');
    history.replaceState(null, '', newUrl);
    performSearch(q);
  });

  // Focus input on load
  input.focus();

  function performSearch(query) {
    resultsDiv.innerHTML = '';
    if (!query || query.length < 1) {
      return;
    }

    var q = query.toLowerCase();
    var matches = [];

    for (var i = 0; i < SEARCH_INDEX.length; i++) {
      var page = SEARCH_INDEX[i];
      var contentLower = page.content.toLowerCase();
      var titleLower = page.title.toLowerCase();

      // Check if query exists in title or content
      if (titleLower.indexOf(q) !== -1 || contentLower.indexOf(q) !== -1) {
        // Build snippet with highlighted match
        var snippet = buildSnippet(page.content, query);
        matches.push({
          title: page.title,
          url: resolveUrl(page.url),
          snippet: snippet
        });
      }
    }

    if (matches.length === 0) {
      resultsDiv.innerHTML = '<div class="search-page-empty">No results found for "<strong>' + escapeHtml(query) + '</strong>"</div>';
      return;
    }

    for (var j = 0; j < matches.length; j++) {
      var m = matches[j];
      var item = document.createElement('a');
      item.className = 'search-page-result';
      item.href = m.url;

      var titleEl = document.createElement('h3');
      titleEl.className = 'search-page-result-title';
      titleEl.textContent = m.title;

      var snippetEl = document.createElement('p');
      snippetEl.className = 'search-page-result-snippet';
      snippetEl.innerHTML = m.snippet;

      item.appendChild(titleEl);
      item.appendChild(snippetEl);
      resultsDiv.appendChild(item);
    }
  }

  function buildSnippet(content, query) {
    var q = query.toLowerCase();
    var contentLower = content.toLowerCase();
    var idx = contentLower.indexOf(q);
    if (idx === -1) return truncate(content, 200);

    // Extract a window around the match
    var snippetRadius = 120;
    var start = Math.max(0, idx - snippetRadius);
    var end = Math.min(content.length, idx + query.length + snippetRadius);

    var raw = content.substring(start, end);
    var prefix = start > 0 ? '...' : '';
    var suffix = end < content.length ? '...' : '';

    // Highlight ALL occurrences of the query in the snippet
    var highlighted = highlightAll(raw, query);
    return prefix + highlighted + suffix;
  }

  function highlightAll(text, query) {
    var q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var regex = new RegExp('(' + q + ')', 'gi');
    return escapeHtml(text).replace(new RegExp('(' + escapeForRegex(query) + ')', 'gi'), '<mark class="search-highlight">$1</mark>');
  }

  function escapeForRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function truncate(str, len) {
    if (str.length <= len) return escapeHtml(str);
    return escapeHtml(str.substring(0, len)) + '...';
  }

  // Resolve URL relative to site root from within /pages/search.html
  function resolveUrl(url) {
    // URLs in the index are relative to root (e.g. "index.html", "pages/partners.html")
    // We're in /pages/search.html, so we need to go up one level for root files
    if (url.indexOf('pages/') === 0) {
      // Same directory level — just strip "pages/"
      return url.replace('pages/', '');
    } else {
      // Root-level file like index.html
      return '../' + url;
    }
  }
})();
</script>
